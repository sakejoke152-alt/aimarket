<!DOCTYPE html>
<html lang="kaa">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Fresh Harvest — Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *{font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
  body{background:#0f172a;min-height:100vh;margin:0;padding-bottom:36px;color:#fff}

  /* ── Header ── */
  .ahd{background:linear-gradient(135deg,#1e293b,#0f172a);padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:50}

  /* ── Stat kartalar ── */
  .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:14px 16px}
  .sk{background:#1e293b;border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.06)}
  .sk .san{font-size:26px;font-weight:900;color:#fff;margin:0}
  .sk .lab{font-size:11px;font-weight:700;color:#64748b;margin:4px 0 0}

  /* ── Tab ── */
  .tabs{display:flex;gap:8px;padding:0 16px 14px}
  .tab{flex:1;padding:10px 6px;border-radius:12px;border:2px solid transparent;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;background:#1e293b;color:#64748b}
  .tab.on{background:#006846;border-color:#006846;color:#fff}

  /* ── Tovar qator ── */
  .tq{background:#1e293b;border-radius:16px;margin:0 16px 10px;border:1px solid rgba(255,255,255,.06)}
  .tqi{display:flex;align-items:center;gap:12px;padding:12px}
  .tq img{width:58px;height:58px;border-radius:12px;object-fit:cover;background:#0f172a;flex-shrink:0}
  .at{font-size:14px;font-weight:800;color:#fff;margin:0 0 2px}
  .meta{font-size:11px;color:#64748b;font-weight:600}
  .pr{font-size:14px;font-weight:900;color:#00c47b}
  .acts{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
  .ebtn{background:#1e40af;color:#fff;border:none;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer}
  .dbtn{background:#7f1d1d;color:#fff;border:none;border-radius:10px;padding:8px 10px;font-size:14px;cursor:pointer}
  .togbtn{border:none;border-radius:10px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer}
  .togbtn.bar{background:#14532d;color:#4ade80}
  .togbtn.yoq{background:#450a0a;color:#f87171}

  /* ── Forma slayder ── */
  .fmbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
  .fmbg.on{display:flex}
  .fmpanel{background:#1e293b;border-radius:28px 28px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:8px 18px 32px}
  .fbar{width:40px;height:4px;background:#334155;border-radius:2px;margin:12px auto 18px}
  .lbl{font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px;margin-bottom:6px;display:block}
  .finp{background:#0f172a;border:2px solid #334155;border-radius:12px;padding:12px 13px;font-size:15px;font-weight:700;color:#fff;width:100%;box-sizing:border-box;outline:none;transition:border-color .2s}
  .finp:focus{border-color:#006846}
  .finp::placeholder{color:#475569}
  .fsel{background:#0f172a;border:2px solid #334155;border-radius:12px;padding:12px 13px;font-size:15px;font-weight:700;color:#fff;width:100%;box-sizing:border-box;outline:none;appearance:none;cursor:pointer}
  .sbtn{background:linear-gradient(135deg,#006846,#00a86b);color:#fff;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:900;width:100%;cursor:pointer;margin-top:18px}
  .cbtn{background:#334155;color:#94a3b8;border:none;border-radius:16px;padding:13px;font-size:14px;font-weight:700;width:100%;cursor:pointer;margin-top:8px}

  /* ── FAB ── */
  .fab{position:fixed;bottom:22px;right:18px;background:linear-gradient(135deg,#006846,#00c47b);color:#fff;border:none;border-radius:50%;width:58px;height:58px;font-size:27px;cursor:pointer;box-shadow:0 6px 24px rgba(0,168,107,.48);z-index:100;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:active{transform:scale(.9)}

  /* ── Toast ── */
  .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#006846;color:#fff;border-radius:14px;padding:11px 22px;font-size:14px;font-weight:800;z-index:500;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.on{opacity:1}

  /* ── Confirm ── */
  .cfbg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center}
  .cfbg.on{display:flex}
  .cfk{background:#1e293b;border-radius:20px;padding:22px;max-width:278px;margin:16px;text-align:center}

  /* ── Filtr chips ── */
  .fchips{display:flex;gap:7px;flex-wrap:wrap;padding:0 16px 12px}
  .fchip{background:#1e293b;border:1.5px solid #334155;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;color:#94a3b8;cursor:pointer;transition:all .2s}
  .fchip.on{background:#006846;border-color:#006846;color:#fff}

  /* ── Rasm yuklovchi ── */
  .rzona{background:#0f172a;border:2px dashed #334155;border-radius:16px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .rzona:hover,.rzona.drag{border-color:#006846}
  .rzona input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;z-index:2}
  .rzona .hint{text-align:center;pointer-events:none;padding:18px}
  .rzona img.prev{width:100%;height:140px;object-fit:cover;display:block}
  .rzona .ov{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;flex-direction:column;gap:5px;z-index:1}
  .rzona:hover .ov{display:flex}
  .pbar{height:4px;background:#334155;border-radius:2px;margin-top:6px;overflow:hidden;display:none}
  .pfill{height:100%;background:linear-gradient(90deg,#006846,#00c47b);width:0%;transition:width .25s;border-radius:2px}
  .rtabs{display:flex;gap:6px;margin-bottom:8px}
  .rtab{flex:1;padding:8px 4px;border-radius:10px;border:1.5px solid #334155;background:#0f172a;color:#64748b;font-size:12px;font-weight:800;cursor:pointer;text-align:center;transition:all .2s}
  .rtab.on{border-color:#006846;background:#006846;color:#fff}
  .dis{opacity:.55;pointer-events:none}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="ahd">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:10px;font-weight:800;color:#006846;letter-spacing:2px">ADMIN PANELI</div>
      <div style="font-size:18px;font-weight:900">Fresh Harvest 🌿</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="index.html" style="background:#1e293b;color:#94a3b8;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:700;text-decoration:none;border:1px solid #334155">👁 Dúkan</a>
      <button onclick="shıǵıw()" style="background:#7f1d1d;color:#fca5a5;border:none;border-radius:10px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer">🚪</button>
    </div>
  </div>
</div>

<!-- STAT -->
<div class="sgrid">
  <div class="sk"><p class="san" id="sJami">–</p><p class="lab">📦 Jámı Tovar</p></div>
  <div class="sk"><p class="san" id="sBar">–</p><p class="lab">✅ Mavjud</p></div>
  <div class="sk"><p class="san" id="sOrta">–</p><p class="lab">💰 O'rtacha Baha</p></div>
  <div class="sk"><p class="san" id="sKat">–</p><p class="lab">🏷 Kategoriya</p></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab on" id="tt" onclick="tabKo('t',this)">📦 Tovarlar</button>
  <button class="tab"    id="tq" onclick="tabKo('q',this)">➕ Jańa Qosıw</button>
</div>

<!-- TOVARLAR PANELI -->
<div id="pt">
  <div class="fchips">
    <div class="fchip on" onclick="filt('',this)">Barlıq</div>
    <div class="fchip" onclick="filt('miyweler',this)">🍎 Miyweler</div>
    <div class="fchip" onclick="filt('sut',this)">🥛 Sút</div>
    <div class="fchip" onclick="filt('paliz',this)">🥦 Palız</div>
    <div class="fchip" onclick="filt('nan',this)">🍞 Nan</div>
  </div>
  <div id="tlist">
    <div style="text-align:center;padding:32px;color:#475569;font-weight:700">⏳ Yuklenip atır...</div>
  </div>
</div>

<!-- JANA QOSISH PANELI -->
<div id="pq" style="display:none;padding:0 16px">
  <div style="background:#1e293b;border-radius:20px;padding:18px;border:1px solid rgba(255,255,255,.06)">
    <h3 style="font-size:17px;font-weight:900;margin:0 0 18px">➕ Jańa Tovar Qosıw</h3>
    <div id="qforma"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="fmAch(null)" title="Jańa tovar">+</button>

<!-- FORMA MODAL -->
<div class="fmbg" id="fmbg" onclick="if(event.target===this)fmJab()">
  <div class="fmpanel">
    <div class="fbar"></div>
    <h3 id="fmtitle" style="font-size:17px;font-weight:900;margin:0 0 18px"></h3>
    <div id="fmich"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="cfbg" id="cfbg">
  <div class="cfk">
    <div style="font-size:38px;margin-bottom:10px">🗑️</div>
    <h3 style="font-size:16px;font-weight:900;margin:0 0 8px">Haqıyqatdan óshiresizbe?</h3>
    <p style="color:#64748b;font-size:13px;font-weight:600;margin:0 0 18px">Bul ámel artqa qaytarılmaydi</p>
    <div style="display:flex;gap:8px">
      <button onclick="cfJab()" style="flex:1;background:#334155;color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;cursor:pointer">Joq</button>
      <button id="cfha" style="flex:1;background:#991b1b;color:#fff;border:none;border-radius:12px;padding:12px;font-weight:800;cursor:pointer">Hawa, óshir</button>
    </div>
  </div>
</div>

<script type="module">
import { Auth, DB, Storage, somsózi, katAt, plImg } from './app.js';

// ── Auth ────────────────────────────────────────────────
const user = Auth.meni();
if (!user || user.rol !== 'admin') { location.href = 'auth.html'; throw 0; }

// ── State ───────────────────────────────────────────────
let all = [], aktFilt = '', tahrirId = null;

// ── Real-time ────────────────────────────────────────────
const unsub = DB.realtime(rows => { all = rows; statYa(); tlistRender(); });
window.addEventListener('pagehide', () => unsub?.());

// ── Statistika ───────────────────────────────────────────
function statYa() {
  document.getElementById('sJami').textContent = all.length;
  document.getElementById('sBar').textContent  = all.filter(t => t.is_available !== false).length;
  const ort = all.length ? Math.round(all.reduce((s,t)=>s+t.price,0)/all.length) : 0;
  document.getElementById('sOrta').textContent = (ort/1000).toFixed(0)+'K';
  document.getElementById('sKat').textContent  = new Set(all.map(t=>t.category)).size;
}

// ── Tovar listi ──────────────────────────────────────────
function tlistRender() {
  const list = aktFilt ? all.filter(t=>t.category===aktFilt) : all;
  const el   = document.getElementById('tlist');
  if (!list.length) {
    el.innerHTML = `<div style="text-align:center;padding:32px;color:#475569;font-weight:700">📦 Tovarlar yoq — jańa qosıń!</div>`;
    return;
  }
  el.innerHTML = list.map(t => `
    <div class="tq">
      <div class="tqi">
        <img src="${t.image_url || plImg(t.name)}" alt="${t.name}"
          onerror="this.src='${plImg(t.name)}'"/>
        <div style="flex:1;min-width:0">
          <p class="at">${t.name}</p>
          <p class="meta">${katAt(t.category)} • ${t.calories??0} kkal</p>
          <p class="pr">${somsózi(t.price)}</p>
        </div>
        <div class="acts">
          <button class="togbtn ${t.is_available!==false?'bar':'yoq'}" onclick="togBar(${t.id})">
            ${t.is_available!==false?'✓':'✗'}
          </button>
          <button class="ebtn" onclick="fmAch(${t.id})">✏️</button>
          <button class="dbtn" onclick="cfAch(${t.id})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
}

// ── Tab ──────────────────────────────────────────────────
window.tabKo = (k, el) => {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const t = k==='t';
  document.getElementById('pt').style.display = t?'block':'none';
  document.getElementById('pq').style.display = t?'none':'block';
  document.getElementById('fab').style.display = t?'flex':'none';
  if (k==='q') { document.getElementById('qforma').innerHTML = formaHTML(null); tahrirId=null; }
};

// ── Filtr ────────────────────────────────────────────────
window.filt = (k, el) => {
  aktFilt = k;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on'); tlistRender();
};

// ── Forma HTML ───────────────────────────────────────────
function formaHTML(t) {
  const v = k => t?.[k] ?? '';
  const existUrl = v('image_url');
  return `
    <div style="margin-bottom:13px">
      <label class="lbl">TOVAR ATI *</label>
      <input id="fat" class="finp" type="text" placeholder="mısal: Taze alma" value="${existUrl ? '' : ''}${v('name')}"/>
    </div>
    <div style="margin-bottom:13px">
      <label class="lbl">KATEGORIYA *</label>
      <select id="fkat" class="fsel">
        ${['miyweler','sut','paliz','nan'].map(k=>`<option value="${k}" ${v('category')===k?'selected':''}>${katAt(k)} ${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">
      <div>
        <label class="lbl">BAHA (SO'M) *</label>
        <input id="fbaha" class="finp" type="number" placeholder="10000" value="${v('price')}"/>
      </div>
      <div>
        <label class="lbl">KALORIYA</label>
        <input id="fkal" class="finp" type="number" placeholder="50" value="${v('calories')}"/>
      </div>
    </div>

    <div style="margin-bottom:14px">
      <label class="lbl">TOVAR RASM *</label>

      <!-- Tab: Yuklew / URL -->
      <div class="rtabs">
        <div class="rtab on" id="rt-yukle" onclick="rasmTab('yukle')">📁 Galerya / Kamera</div>
        <div class="rtab"    id="rt-url"   onclick="rasmTab('url')">🔗 URL Adres</div>
      </div>

      <!-- Yuklew paneli -->
      <div id="rp-yukle">
        <div class="rzona" id="rzona"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="dropRasm(event)">

          <input type="file" id="ffile" accept="image/*" capture="environment"
            onchange="faylTanla(this)"/>

          <!-- Ko'rinish: rasm yo'q -->
          <div class="hint" id="zona-hint" style="${existUrl?'display:none':''}">
            <div style="font-size:36px;margin-bottom:8px">📷</div>
            <div style="font-size:13px;font-weight:800;color:#64748b;margin-bottom:4px">
              Rasmni tanlań yaki sudrab tashlań
            </div>
            <div style="font-size:11px;color:#475569;font-weight:600">
              Galerya • Kamera • Drag&Drop
            </div>
            <div style="font-size:10px;color:#334155;margin-top:6px">maks 5MB • JPG/PNG/WEBP</div>
          </div>

          <!-- Ko'rinish: rasm bor -->
          <img class="prev" id="zona-prev" src="${existUrl||''}"
            style="${existUrl?'':'display:none'}" alt="Rasm"/>

          <!-- Hover overlay -->
          <div class="ov">
            <div style="font-size:24px">📷</div>
            <div style="font-size:12px;font-weight:800;color:#fff">Almashtırıw</div>
          </div>
        </div>

        <!-- Progress -->
        <div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>
        <div id="yukle-status" style="font-size:11px;color:#64748b;font-weight:600;margin-top:4px;min-height:16px"></div>
      </div>

      <!-- URL paneli -->
      <div id="rp-url" style="display:none">
        <input id="frasm-url" class="finp" type="url"
          placeholder="https://example.com/rasm.jpg"
          value="${existUrl||''}"
          oninput="urlPrev(this.value)"/>
        <img id="url-prev" src="${existUrl||''}"
          style="${existUrl?'width:100%;height:120px;object-fit:cover;border-radius:12px;margin-top:8px':'display:none'}"
          onerror="this.style.display='none'"/>
      </div>
    </div>

    <!-- Yashirin rasm URL (saqlaw uchun) -->
    <input type="hidden" id="frasm" value="${existUrl||''}"/>

    <button class="sbtn" id="sbtn" onclick="saqla()">
      ${t ? '💾 Ózgerislerni Saqlaw' : '✅ Tovar Qosıw'}
    </button>
    <button class="cbtn" onclick="fmJab();tabKo('t',document.getElementById('tt'))">Bekor qılıw</button>`;
}

// ── Rasm tab almastırıw ──────────────────────────────────
window.rasmTab = mode => {
  document.getElementById('rp-yukle').style.display = mode==='yukle' ? 'block' : 'none';
  document.getElementById('rp-url').style.display   = mode==='url'   ? 'block' : 'none';
  document.getElementById('rt-yukle').classList.toggle('on', mode==='yukle');
  document.getElementById('rt-url').classList.toggle('on',   mode==='url');
};

// ── Fayl tanlash ─────────────────────────────────────────
window.faylTanla = async input => {
  const file = input.files?.[0]; if (!file) return;
  await rasmYukle(file);
};

// ── Drag & Drop ──────────────────────────────────────────
window.dropRasm = async e => {
  e.preventDefault();
  document.getElementById('rzona').classList.remove('drag');
  const file = e.dataTransfer?.files?.[0];
  if (file?.type.startsWith('image/')) await rasmYukle(file);
};

// ── URL preview ──────────────────────────────────────────
window.urlPrev = url => {
  const img = document.getElementById('url-prev');
  document.getElementById('frasm').value = url;
  if (url?.startsWith('http')) {
    img.src = url;
    img.style.cssText = 'width:100%;height:120px;object-fit:cover;border-radius:12px;margin-top:8px;display:block';
    img.onerror = () => img.style.display = 'none';
  } else { img.style.display='none'; }
};

// ── Rasm Supabase-ga yuklash ─────────────────────────────
async function rasmYukle(file) {
  const hint   = document.getElementById('zona-hint');
  const prev   = document.getElementById('zona-prev');
  const pbar   = document.getElementById('pbar');
  const pfill  = document.getElementById('pfill');
  const status = document.getElementById('yukle-status');
  const rasEl  = document.getElementById('frasm');

  // Local preview — tez ko'rsatiw
  const localUrl = URL.createObjectURL(file);
  hint.style.display = 'none';
  prev.src = localUrl; prev.style.display = 'block';
  pbar.style.display = 'block'; pfill.style.width = '0%';
  status.textContent = 'Yuklanip atır...';
  status.style.color = '#64748b';

  try {
    const url = await Storage.rasmYükle(file, pct => {
      pfill.style.width = pct + '%';
    });
    rasEl.value = url;
    prev.src    = url;
    URL.revokeObjectURL(localUrl);
    status.textContent = '✅ Rasm saqlandi!';
    status.style.color = '#00c47b';
    setTimeout(() => { pbar.style.display='none'; status.textContent=''; }, 2000);
  } catch(e) {
    prev.style.display = 'none'; hint.style.display = '';
    pbar.style.display = 'none';
    status.textContent = '❌ ' + e.message;
    status.style.color = '#f87171';
    URL.revokeObjectURL(localUrl);
  }
}

// ── Forma ach / jab ─────────────────────────────────────
window.fmAch = id => {
  tahrirId = id;
  const t = id ? all.find(x=>x.id===id) : null;
  document.getElementById('fmtitle').textContent = id ? '✏️ Tovarni Tahrir Etiw' : '➕ Jańa Tovar Qosıw';
  document.getElementById('fmich').innerHTML = formaHTML(t);
  document.getElementById('fmbg').classList.add('on');
  if (t?.image_url) window.rprev(t.image_url);
};
window.fmJab = () => { document.getElementById('fmbg').classList.remove('on'); tahrirId=null; };

// ── Saqlaw ──────────────────────────────────────────────
window.saqla = async () => {
  const at   = document.getElementById('fat').value.trim();
  const baha = Number(document.getElementById('fbaha').value);
  if (!at)           return toast('❌ Tovar atın kiritıń!');
  if (!baha||baha<=0) return toast('❌ Dúris baha kiriting!');

  // URL tab aktiv bolsa — URL inputdan al
  const urlTabAktiv = document.getElementById('rp-url')?.style.display !== 'none';
  if (urlTabAktiv) {
    const urlVal = document.getElementById('frasm-url')?.value.trim();
    if (urlVal) document.getElementById('frasm').value = urlVal;
  }
  const rasm = document.getElementById('frasm').value.trim();

  const d = {
    at, baha,
    kategoriya: document.getElementById('fkat').value,
    rasm,
    kaloriya: Number(document.getElementById('fkal').value)||0,
  };
  const sbtn = document.getElementById('sbtn');
  sbtn.classList.add('dis'); sbtn.textContent='Saqlap atır...';
  try {
    if (tahrirId) { await DB.ózgert(tahrirId, d); toast('✅ Tovar ózgertirildi!'); }
    else          { await DB.qos(d);              toast('✅ Jańa tovar qosıldı!'); }
    fmJab();
    const qf=document.getElementById('qforma');
    if (qf.innerHTML) qf.innerHTML=formaHTML(null);
  } catch(e) { toast('❌ Qate: '+e.message); sbtn.classList.remove('dis'); sbtn.textContent='💾 Saqlaw'; }
};

// ── Mavjudligi toggle ────────────────────────────────────
window.togBar = async id => {
  const t = all.find(x=>x.id===id); if(!t) return;
  try {
    await DB.ózgert(id, {
      at: t.name, baha: t.price, kategoriya: t.category,
      rasm: t.image_url, kaloriya: t.calories,
      is_available: t.is_available===false,
    });
    toast(t.is_available===false ? '✅ Tovar aktiv etildi' : '⛔ Tovar passiv etildi');
  } catch(e) { toast('❌ '+e.message); }
};

// ── Óshiriw confirm ──────────────────────────────────────
let cfId = null;
window.cfAch = id => { cfId=id; document.getElementById('cfbg').classList.add('on'); };
window.cfJab = ()  => { document.getElementById('cfbg').classList.remove('on'); cfId=null; };
document.getElementById('cfha').onclick = async () => {
  try { await DB.óshir(cfId); cfJab(); toast('🗑️ Tovar óshirildi!'); }
  catch(e) { toast('❌ '+e.message); }
};

// ── Toast ────────────────────────────────────────────────
function toast(m) {
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),2600);
}
window.toast = toast;

// ── Shıǵıw ──────────────────────────────────────────────
window.shıǵıw = () => { Auth.shıǵıw(); location.href='auth.html'; };
</script>
